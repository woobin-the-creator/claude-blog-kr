<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>유튜브 → 포스트 큐 · Claude 블로그 한글 번역</title>
<style>
  :root { --fg:#1a1a1a; --muted:#666; --line:#e5e5e5; --accent:#c96442; --soft:#faf8f6; }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",
      "Malgun Gothic", sans-serif;
    color: var(--fg); line-height: 1.7; max-width: 820px; margin: 0 auto;
    padding: 48px 24px 96px; background:#fff;
  }
  a { color: var(--accent); text-decoration: none; }
  .top-back { font-size:0.88rem; }
  h1 { font-size:1.7rem; margin:14px 0 6px; }
  .sub { color: var(--muted); font-size:0.92rem; margin:0 0 28px; }

  .enqueue { border:1px solid var(--line); border-radius:12px; background:var(--soft);
    padding:16px 18px; margin:0 0 22px; }
  .enqueue-row { display:flex; gap:8px; flex-wrap:wrap; }
  .enqueue-row input { flex:1 1 280px; min-width:220px; font:inherit; font-size:0.94rem;
    padding:10px 14px; border:1px solid var(--line); border-radius:10px; background:#fff;
    color:var(--fg); }
  .enqueue-row input:focus { outline:none; border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(201,100,66,.12); }
  .enqueue-row button { font:inherit; font-size:0.9rem; cursor:pointer; border:1px solid var(--accent);
    background:var(--accent); color:#fff; border-radius:10px; padding:10px 18px; white-space:nowrap; }
  .enqueue-row button:hover { opacity:.92; }
  .enqueue-row button:disabled { opacity:.5; cursor:default; }
  .enqueue-hint { font-size:0.78rem; color:var(--muted); line-height:1.6; margin:10px 0 0; }
  .enqueue-msg { font-size:0.82rem; margin:8px 0 0; min-height:1em; }
  .enqueue-msg.ok { color:#2e8b57; }
  .enqueue-msg.err { color:#c0392b; }

  .nokey { border:1px dashed var(--line); border-radius:12px; padding:20px;
    color:var(--muted); font-size:0.9rem; }
  .nokey a { font-weight:600; }

  .qhead { display:flex; align-items:center; gap:10px; margin:26px 0 10px; }
  .qhead h2 { font-size:1.1rem; margin:0; }
  .qhead button { font:inherit; font-size:0.8rem; cursor:pointer; border:1px solid var(--line);
    background:#fff; color:var(--muted); border-radius:8px; padding:5px 11px; }
  .qhead button:hover { border-color:var(--accent); color:var(--accent); }

  .qitem { border:1px solid var(--line); border-radius:12px; padding:13px 16px;
    margin:0 0 10px; background:var(--soft); display:flex; gap:12px; align-items:flex-start;
    flex-wrap:wrap; }
  .qbody { flex:1 1 320px; min-width:240px; }
  .qurl { font-size:0.9rem; word-break:break-all; }
  .qmeta { display:block; color:var(--muted); font-size:0.76rem; margin-top:3px; }
  .qerr { display:block; color:#c0392b; font-size:0.78rem; margin-top:4px; word-break:break-all; }
  .qbadge { font-size:0.76rem; border-radius:999px; padding:4px 11px; white-space:nowrap;
    border:1px solid var(--line); color:var(--muted); background:#fff; }
  .qbadge.pending    { color:#8a6d00; border-color:#e6d28a; background:#fdf7e3; }
  .qbadge.processing { color:#1a5da6; border-color:#a8c8ea; background:#eaf2fb; }
  .qbadge.done       { color:#2e8b57; border-color:#a8d8bc; background:#eaf7ef; }
  .qbadge.error      { color:#c0392b; border-color:#e6b0a8; background:#fbecea; }
  .qact { display:flex; gap:6px; }
  .qact button { font:inherit; font-size:0.78rem; cursor:pointer; border:none; background:none;
    color:var(--muted); text-decoration:underline; padding:0 2px; }
  .qact button:hover { color:var(--accent); }
  .empty { text-align:center; color:var(--muted); padding:40px 20px;
    border:1px dashed var(--line); border-radius:12px; }
  footer { margin-top:40px; color:var(--muted); font-size:0.8rem; }
</style>
</head>
<body>
  <a class="top-back" href="index.html">← 글 목록으로</a>
  <h1>📺 유튜브 → 포스트 큐</h1>
  <p class="sub">유튜브 URL을 넣어두면 맥의 파이프라인이 순서대로 한글 포스트로 만들어 올립니다.
    처리 주기는 약 10분이며, 영상 하나에 수 분이 걸립니다.</p>

  <div id="app"></div>

  <footer>비공식 번역본 · 큐는 보관함과 같은 동기화 코드로 보호됩니다.</footer>

  <script src="posts/assets/cbk-config.js"></script>
  <script src="posts/assets/store.js"></script>
  <script>
  (function () {
    var CBK = window.CBK;
    var app = document.getElementById("app");

    function cfg() {
      var c = window.CBK_CONFIG || {};
      return { url: (c.supabaseUrl || "").replace(/\/+$/, ""), key: c.supabaseAnonKey || "" };
    }
    function rpc(fn, body) {
      var c = cfg();
      return fetch(c.url + "/rest/v1/rpc/" + fn, {
        method: "POST",
        headers: {
          "apikey": c.key,
          "Authorization": "Bearer " + c.key,
          "Content-Type": "application/json"
        },
        body: JSON.stringify(body)
      }).then(function (r) {
        if (!r.ok) return r.text().then(function (t) {
          // PostgREST 에러 JSON에서 message만 추리기
          var msg = t;
          try { msg = JSON.parse(t).message || t; } catch (e) {}
          throw new Error(msg);
        });
        return r.status === 204 ? null : r.json();
      });
    }

    var syncKey = (CBK && CBK.sync && CBK.sync.getKey && CBK.sync.getKey()) || "";
    var configured = CBK && CBK.sync && CBK.sync.isConfigured && CBK.sync.isConfigured();

    if (!configured || !syncKey) {
      app.innerHTML =
        '<div class="nokey">이 페이지는 <a href="library.html">보관함</a>의 동기화 코드가 있어야 씁니다.' +
        "<br>보관함 → 기기 간 동기화에서 코드를 만들거나 입력한 뒤 다시 열어주세요.</div>";
      return;
    }

    app.innerHTML =
      '<section class="enqueue">' +
        '<div class="enqueue-row">' +
          '<input type="url" id="yt-url" placeholder="https://www.youtube.com/watch?v=… 또는 youtu.be/…"' +
            ' autocomplete="off" spellcheck="false">' +
          '<button type="button" id="yt-add">큐에 넣기</button>' +
        "</div>" +
        '<p class="enqueue-hint">공개 영상만 가능합니다(비공개·일부공개는 Gemini가 못 봅니다).' +
          " 완료되면 텔레그램으로 알림이 옵니다.</p>" +
        '<p class="enqueue-msg" id="yt-msg"></p>' +
      "</section>" +
      '<div class="qhead"><h2>큐 상태</h2><button type="button" id="yt-refresh">새로고침</button></div>' +
      '<div id="yt-list"></div>';

    var urlEl = document.getElementById("yt-url");
    var addBtn = document.getElementById("yt-add");
    var msgEl = document.getElementById("yt-msg");
    var listEl = document.getElementById("yt-list");

    function setMsg(text, kind) {
      msgEl.textContent = text || "";
      msgEl.className = "enqueue-msg" + (kind ? " " + kind : "");
    }
    function esc(s) {
      return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) {
        return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
      });
    }
    function fmt(ts) {
      try {
        var d = new Date(ts);
        return d.toLocaleDateString("ko-KR", { month: "numeric", day: "numeric" }) + " " +
               d.toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit" });
      } catch (e) { return ts; }
    }
    var LABEL = { pending: "대기 중", processing: "처리 중", done: "완료", error: "실패" };

    function render(rows) {
      if (!rows || !rows.length) {
        listEl.innerHTML = '<div class="empty">아직 큐에 넣은 영상이 없습니다.</div>';
        return;
      }
      listEl.innerHTML = "";
      rows.forEach(function (r) {
        var el = document.createElement("div");
        el.className = "qitem";
        var body = '<div class="qbody"><span class="qurl">' +
          (r.status === "done" && r.post_slug
            ? '<a href="posts/' + esc(r.post_slug) + '.html">' + esc(r.url) + "</a>"
            : esc(r.url)) +
          "</span>" +
          '<span class="qmeta">' + fmt(r.created_at) + " 등록" +
            (r.status === "done" && r.post_slug ? " · posts/" + esc(r.post_slug) + ".html" : "") +
          "</span>" +
          (r.status === "error" && r.error ? '<span class="qerr">' + esc(r.error) + "</span>" : "") +
          "</div>";
        var badge = '<span class="qbadge ' + esc(r.status) + '">' +
          (LABEL[r.status] || esc(r.status)) + "</span>";
        var acts = "";
        if (r.status === "error") {
          acts = '<span class="qact"><button type="button" data-act="retry">재시도</button>' +
                 '<button type="button" data-act="remove">삭제</button></span>';
        } else if (r.status === "pending" || r.status === "done") {
          acts = '<span class="qact"><button type="button" data-act="remove">삭제</button></span>';
        }
        el.innerHTML = body + badge + acts;

        el.querySelectorAll("[data-act]").forEach(function (btn) {
          btn.addEventListener("click", function () {
            var act = btn.getAttribute("data-act");
            var p = act === "retry"
              ? rpc("cbk_yt_finish", { p_key: syncKey, p_id: r.id, p_status: "pending" })
              : rpc("cbk_yt_remove", { p_key: syncKey, p_id: r.id });
            p.then(refresh).catch(function (e) { setMsg("실패: " + e.message, "err"); });
          });
        });
        listEl.appendChild(el);
      });
    }

    function refresh() {
      return rpc("cbk_yt_list", { p_key: syncKey })
        .then(render)
        .catch(function (e) { setMsg("목록을 못 불러왔습니다: " + e.message, "err"); });
    }

    function enqueue() {
      var url = urlEl.value.trim();
      if (!url) { urlEl.focus(); return; }
      addBtn.disabled = true;
      setMsg("등록 중…", "");
      rpc("cbk_yt_enqueue", { p_key: syncKey, p_url: url })
        .then(function () {
          urlEl.value = "";
          setMsg("큐에 넣었습니다. 다음 주기에 처리됩니다.", "ok");
          return refresh();
        })
        .catch(function (e) {
          setMsg("등록 실패: " + (/not a youtube url/.test(e.message)
            ? "유튜브 URL이 아닙니다." : e.message), "err");
        })
        .then(function () { addBtn.disabled = false; });
    }

    addBtn.addEventListener("click", enqueue);
    urlEl.addEventListener("keydown", function (e) { if (e.key === "Enter") enqueue(); });
    document.getElementById("yt-refresh").addEventListener("click", refresh);

    refresh();
    // 처리 중인 항목이 보이는 동안엔 1분마다 자동 새로고침
    setInterval(function () {
      if (listEl.querySelector(".qbadge.processing, .qbadge.pending")) refresh();
    }, 60000);
  })();
  </script>
</body>
</html>
