<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 보관함 · Claude 블로그 한글 번역</title>
<style>
  :root { --fg:#1a1a1a; --muted:#666; --line:#e5e5e5; --accent:#c96442; --soft:#faf8f6; }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",
      "Malgun Gothic", sans-serif;
    color: var(--fg); line-height: 1.7; max-width: 820px; margin: 0 auto;
    padding: 48px 24px 96px; background:#fff;
  }
  a { color: var(--accent); text-decoration: none; }
  .top-back { font-size:0.88rem; }
  h1 { font-size:1.7rem; margin:14px 0 6px; }
  .sub { color: var(--muted); font-size:0.92rem; margin:0 0 28px; }

  .toolbar { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin:0 0 16px; }
  .search { flex:1 1 220px; min-width:180px; }
  .search input { width:100%; font:inherit; padding:9px 13px; border:1px solid var(--line);
    border-radius:999px; background:#fff; color:var(--fg); }
  .search input:focus { outline:none; border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(201,100,66,.12); }
  .chips { display:flex; gap:6px; }
  .chip { font:inherit; font-size:0.86rem; cursor:pointer; border:1px solid var(--line);
    background:#fff; color:var(--fg); border-radius:999px; padding:7px 13px; }
  .chip:hover { border-color:var(--accent); color:var(--accent); }
  .chip.on { background:var(--accent); border-color:var(--accent); color:#fff; }
  .data-tools { display:flex; gap:8px; margin-left:auto; }
  .data-tools button, .data-tools label { font:inherit; font-size:0.84rem; cursor:pointer;
    border:1px solid var(--line); background:#fff; color:var(--muted); border-radius:8px;
    padding:7px 11px; }
  .data-tools button:hover, .data-tools label:hover { border-color:var(--accent); color:var(--accent); }

  .summary { color:var(--muted); font-size:0.82rem; margin:0 0 18px; }

  .card { border:1px solid var(--line); border-radius:12px; padding:16px 18px;
    margin:0 0 14px; background:var(--soft); }
  .card-head { display:flex; align-items:flex-start; gap:10px; }
  .card-title { flex:1; }
  .card-title a { font-size:1.06rem; font-weight:600; color:var(--fg); line-height:1.4; }
  .card-title a:hover { color:var(--accent); }
  .card-meta { display:block; color:var(--muted); font-size:0.78rem; margin-top:4px; }
  .card-fav { font:inherit; cursor:pointer; border:1px solid var(--line); background:#fff;
    color:var(--muted); border-radius:999px; padding:5px 12px; line-height:1; white-space:nowrap; }
  .card-fav:hover { border-color:var(--accent); color:var(--accent); }
  .card-fav.on { background:var(--accent); border-color:var(--accent); color:#fff; }

  .card-rate { display:inline-flex; gap:6px; margin-right:6px; }
  .card-rate button { font:inherit; font-size:0.86rem; cursor:pointer; border:1px solid var(--line);
    background:#fff; color:var(--muted); border-radius:999px; padding:5px 11px; line-height:1; white-space:nowrap; }
  .card-rate button:hover { border-color:var(--accent); color:var(--accent); }
  .card-like.on { background:#2e8b57; border-color:#2e8b57; color:#fff; }
  .card-like.on:hover { color:#fff; opacity:.92; }
  .card-dislike.on { background:#c0392b; border-color:#c0392b; color:#fff; }
  .card-dislike.on:hover { color:#fff; opacity:.92; }
  .card-reason { width:100%; margin-top:10px; min-height:52px; resize:none; overflow:hidden;
    font:inherit; font-size:0.9rem; line-height:1.6; padding:10px 13px; border:1px solid var(--line);
    border-radius:10px; background:#fff; color:var(--fg); }
  .card-reason::placeholder { color:var(--muted); }
  .card-reason:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(201,100,66,.12); }
  .card-reason[hidden] { display:none; }
  .card-note { width:100%; margin-top:12px; min-height:64px; resize:none; overflow:hidden;
    font:inherit; font-size:0.94rem; line-height:1.6; padding:11px 13px; border:1px solid var(--line);
    border-radius:10px; background:#fff; color:var(--fg); }
  .card-note:focus { outline:none; border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(201,100,66,.12); }
  .card-note.empty { color:var(--muted); }
  .card-foot { display:flex; align-items:center; gap:10px; margin-top:8px; min-height:18px; }
  .card-status { font-size:0.78rem; color:var(--muted); opacity:0; transition:opacity .2s; }
  .card-status.show { opacity:1; }
  .card-status.saved { color:#2e8b57; }
  .card-del { margin-left:auto; font:inherit; font-size:0.8rem; cursor:pointer; border:none;
    background:none; color:var(--muted); text-decoration:underline; padding:0; }
  .card-del:hover { color:#c0392b; }

  .sync { border:1px solid var(--line); border-radius:12px; background:var(--soft);
    padding:14px 16px; margin:0 0 22px; }
  .sync-head { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .sync-title { font-weight:600; font-size:0.96rem; }
  .sync-state { font-size:0.8rem; color:var(--muted); }
  .sync-toggle { margin-left:auto; font:inherit; font-size:0.82rem; cursor:pointer; border:none;
    background:none; color:var(--accent); text-decoration:underline; padding:0; }
  .sync-body { margin-top:12px; }
  .sync-body.hidden { display:none; }
  .sync-row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin:0 0 10px; }
  .sync-row input { flex:1 1 240px; min-width:200px; font:inherit; font-size:0.9rem;
    padding:8px 12px; border:1px solid var(--line); border-radius:8px; background:#fff;
    color:var(--fg); letter-spacing:0.04em; }
  .sync-row input:focus { outline:none; border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(201,100,66,.12); }
  .sync-btn { font:inherit; font-size:0.84rem; cursor:pointer; border:1px solid var(--line);
    background:#fff; color:var(--fg); border-radius:8px; padding:8px 13px; white-space:nowrap; }
  .sync-btn:hover { border-color:var(--accent); color:var(--accent); }
  .sync-btn.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
  .sync-btn.primary:hover { color:#fff; opacity:.92; }
  .sync-btn:disabled { opacity:.5; cursor:default; }
  .sync-hint { font-size:0.78rem; color:var(--muted); line-height:1.6; margin:0; }
  .sync-msg { font-size:0.8rem; margin:8px 0 0; min-height:1em; }
  .sync-msg.ok { color:#2e8b57; }
  .sync-msg.err { color:#c0392b; }

  .empty { text-align:center; color:var(--muted); padding:56px 20px; border:1px dashed var(--line);
    border-radius:12px; }
  .empty a { font-weight:600; }
  footer { margin-top:40px; color:var(--muted); font-size:0.8rem; }
</style>
</head>
<body>
  <a class="top-back" href="index.html">← 글 목록으로</a>
  <h1>📑 내 보관함</h1>
  <p class="sub">즐겨찾기한 글과 작성한 메모를 한곳에서 보고 편집합니다. 이 브라우저에 저장됩니다.</p>

  <div class="toolbar">
    <div class="search"><input type="search" id="q" placeholder="제목·메모 검색…"></div>
    <div class="chips">
      <button type="button" class="chip on" data-filter="all">전체</button>
      <button type="button" class="chip" data-filter="fav">★ 즐겨찾기</button>
      <button type="button" class="chip" data-filter="like">👍 좋아요</button>
      <button type="button" class="chip" data-filter="dislike">👎 싫어요</button>
      <button type="button" class="chip" data-filter="note">📝 메모</button>
    </div>
    <div class="data-tools">
      <button type="button" id="export-wiki" title="평가한 글을 LLM Wiki 입력용 JSON으로 내려받기">선호 내보내기</button>
      <button type="button" id="export">내보내기</button>
      <label class="import">가져오기<input type="file" id="import-input" accept="application/json" hidden></label>
    </div>
  </div>
  <p class="summary" id="summary"></p>

  <section class="sync" id="sync" hidden>
    <div class="sync-head">
      <span class="sync-title">🔄 기기 간 동기화</span>
      <span class="sync-state" id="sync-state"></span>
      <button type="button" class="sync-toggle" id="sync-toggle">설정</button>
    </div>
    <div class="sync-body hidden" id="sync-body">
      <div class="sync-row">
        <input type="text" id="sync-code" placeholder="동기화 코드" autocomplete="off"
          spellcheck="false">
        <button type="button" class="sync-btn" id="sync-gen">새 코드 생성</button>
        <button type="button" class="sync-btn" id="sync-save">코드 저장</button>
      </div>
      <div class="sync-row">
        <button type="button" class="sync-btn primary" id="sync-now">지금 동기화</button>
        <button type="button" class="sync-btn" id="sync-forget">코드 지우기</button>
      </div>
      <p class="sync-hint">
        같은 코드를 다른 기기 보관함에 입력하면 즐겨찾기·메모가 합쳐집니다.
        코드 자체가 비밀번호이니 새 코드를 만들면 안전한 곳에 보관하세요.
        충돌은 최근에 수정한 쪽이 이깁니다.
      </p>
      <p class="sync-msg" id="sync-msg"></p>
    </div>
  </section>

  <div id="list"></div>

  <footer>비공식 번역본 · 데이터는 기본적으로 이 브라우저에만 저장됩니다. 다른 기기로 옮기려면 위의 동기화 코드나 내보내기/가져오기를 쓰세요.</footer>

  <script src="posts/assets/cbk-config.js"></script>
  <script src="posts/assets/posts.js"></script>
  <script src="posts/assets/store.js"></script>
  <script>
  (function () {
    var CBK = window.CBK;
    /* Post catalog comes from posts/assets/posts.js (window.CBK_POSTS) — single source. */
    var POSTS = window.CBK_POSTS || [];

    var listEl = document.getElementById("list");
    var summaryEl = document.getElementById("summary");
    var qEl = document.getElementById("q");
    var filter = "all";
    var query = "";

    function rows() {
      return POSTS.map(function (p) {
        var slug = CBK.slugOf(p.file);
        return {
          post: p, slug: slug,
          fav: CBK.isBookmarked(slug), note: CBK.getNote(slug),
          rating: CBK.getRating(slug), reason: CBK.getReason(slug)
        };
      });
    }

    function hasAny(r) { return r.fav || !!r.note || r.rating !== 0 || !!r.reason; }

    function visible(r) {
      if (filter === "fav" && !r.fav) return false;
      if (filter === "note" && !r.note) return false;
      if (filter === "like" && r.rating !== 1) return false;
      if (filter === "dislike" && r.rating !== -1) return false;
      if (filter === "all" && !hasAny(r)) return false;
      if (query) {
        var hay = (r.post.title + " " + r.note + " " + r.reason).toLowerCase();
        if (hay.indexOf(query) === -1) return false;
      }
      return true;
    }

    function autosize(ta) {
      ta.style.height = "auto";
      ta.style.height = Math.max(ta.scrollHeight, 64) + "px";
    }

    function render() {
      var all = rows();
      var shown = all.filter(visible);

      if (!shown.length) {
        var any = all.some(hasAny);
        var msg = any
          ? "조건에 맞는 항목이 없습니다."
          : "아직 즐겨찾기·평가하거나 메모한 글이 없습니다.";
        summaryRefresh();
        listEl.innerHTML = '<div class="empty">' + msg +
          '<br><br><a href="index.html">글 목록에서 시작하기 →</a></div>';
        return;
      }

      summaryRefresh();
      listEl.innerHTML = "";
      shown.forEach(function (r) {
        var card = document.createElement("div");
        card.className = "card";
        card.innerHTML =
          '<div class="card-head">' +
            '<div class="card-title">' +
              '<a href="posts/' + r.post.file + '">' + esc(r.post.title) + "</a>" +
              '<span class="card-meta">' + r.post.date + " · " + esc(r.post.main) + " · " + esc(r.post.cat) + "</span>" +
            "</div>" +
            '<span class="card-rate">' +
              '<button type="button" class="card-like' + (r.rating === 1 ? " on" : "") + '" title="좋아요">👍</button>' +
              '<button type="button" class="card-dislike' + (r.rating === -1 ? " on" : "") + '" title="별로예요">👎</button>' +
            "</span>" +
            '<button type="button" class="card-fav' + (r.fav ? " on" : "") + '">' +
              (r.fav ? "★ 즐겨찾기됨" : "☆ 즐겨찾기") + "</button>" +
          "</div>" +
          '<textarea class="card-reason" placeholder="왜 이렇게 평가했나요? — 취향 학습에 쓰입니다."' +
            (r.rating !== 0 || r.reason ? "" : " hidden") + "></textarea>" +
          '<textarea class="card-note' + (r.note ? "" : " empty") +
            '" placeholder="메모 추가…">' + "</textarea>" +
          '<div class="card-foot">' +
            '<span class="card-status"></span>' +
            '<button type="button" class="card-del">삭제</button>' +
          "</div>";

        var status = card.querySelector(".card-status");
        function flash() {
          status.textContent = "저장됨 ✓"; status.classList.add("show", "saved");
          setTimeout(function () { status.classList.remove("show"); }, 1500);
        }

        var favBtn = card.querySelector(".card-fav");
        favBtn.addEventListener("click", function () {
          var on = CBK.toggleBookmark(r.slug);
          favBtn.classList.toggle("on", on);
          favBtn.textContent = on ? "★ 즐겨찾기됨" : "☆ 즐겨찾기";
          summaryRefresh();
        });

        var likeBtn = card.querySelector(".card-like");
        var dislikeBtn = card.querySelector(".card-dislike");
        var reasonTa = card.querySelector(".card-reason");
        function paint(v) {
          likeBtn.classList.toggle("on", v === 1);
          dislikeBtn.classList.toggle("on", v === -1);
        }
        function rate(v) {
          var cur = CBK.getRating(r.slug);
          var now = CBK.setRating(r.slug, cur === v ? 0 : v);
          paint(now);
          if (now !== 0) { reasonTa.hidden = false; autosize(reasonTa); reasonTa.focus(); }
          else if (!reasonTa.value.trim()) reasonTa.hidden = true;
          flash(); summaryRefresh();
        }
        likeBtn.addEventListener("click", function () { rate(1); });
        dislikeBtn.addEventListener("click", function () { rate(-1); });

        reasonTa.value = r.reason;
        if (!reasonTa.hidden) autosize(reasonTa);
        var rt = null;
        reasonTa.addEventListener("input", function () {
          autosize(reasonTa);
          if (rt) clearTimeout(rt);
          rt = setTimeout(function () { CBK.setReason(r.slug, reasonTa.value); flash(); }, 450);
        });

        var ta = card.querySelector(".card-note");
        ta.value = r.note;
        autosize(ta);
        var t = null;
        ta.addEventListener("input", function () {
          autosize(ta);
          ta.classList.toggle("empty", !ta.value.trim());
          status.textContent = "저장 중…"; status.classList.add("show"); status.classList.remove("saved");
          if (t) clearTimeout(t);
          t = setTimeout(function () {
            CBK.setNote(r.slug, ta.value);
            flash();
            summaryRefresh();
          }, 450);
        });

        var del = card.querySelector(".card-del");
        del.addEventListener("click", function () {
          if ((r.note || r.reason || r.rating !== 0) &&
              !confirm("이 글의 즐겨찾기·평가·메모를 모두 지울까요?")) return;
          if (CBK.isBookmarked(r.slug)) CBK.toggleBookmark(r.slug);
          CBK.setNote(r.slug, "");
          CBK.setRating(r.slug, 0);
          CBK.setReason(r.slug, "");
          render();
        });

        listEl.appendChild(card);
      });
    }

    function summaryRefresh() {
      var all = rows();
      var favN = all.filter(function (r) { return r.fav; }).length;
      var likeN = all.filter(function (r) { return r.rating === 1; }).length;
      var dislikeN = all.filter(function (r) { return r.rating === -1; }).length;
      var noteN = all.filter(function (r) { return r.note; }).length;
      summaryEl.textContent =
        "즐겨찾기 " + favN + " · 👍 " + likeN + " · 👎 " + dislikeN + " · 메모 " + noteN;
    }

    function esc(s) {
      return String(s).replace(/[&<>"]/g, function (c) {
        return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
      });
    }

    document.querySelectorAll(".chip").forEach(function (chip) {
      chip.addEventListener("click", function () {
        document.querySelectorAll(".chip").forEach(function (c) { c.classList.remove("on"); });
        chip.classList.add("on");
        filter = chip.getAttribute("data-filter");
        render();
      });
    });
    qEl.addEventListener("input", function () { query = qEl.value.trim().toLowerCase(); render(); });

    document.getElementById("export").addEventListener("click", function () { CBK.exportData(); });
    document.getElementById("export-wiki").addEventListener("click", function () {
      if (!CBK.ratedSlugs().length) { alert("아직 좋아요/싫어요로 평가한 글이 없습니다."); return; }
      CBK.exportWiki();
    });
    var imp = document.getElementById("import-input");
    imp.addEventListener("change", function () {
      if (!imp.files || !imp.files[0]) return;
      CBK.importData(imp.files[0], function (err) {
        if (err) { alert("가져오기 실패: 파일 형식을 확인하세요."); return; }
        imp.value = "";
        render();
      });
    });

    if (!CBK) {
      listEl.innerHTML = '<div class="empty">저장소를 불러오지 못했습니다.</div>';
      return;
    }

    /* ---- 기기 간 동기화 UI ---- */
    (function initSync() {
      var sync = CBK.sync;
      var section = document.getElementById("sync");
      if (!sync || !sync.isConfigured()) return; // 설정 전이면 패널을 숨긴 채로 둔다
      section.hidden = false;

      var stateEl = document.getElementById("sync-state");
      var bodyEl = document.getElementById("sync-body");
      var codeEl = document.getElementById("sync-code");
      var msgEl = document.getElementById("sync-msg");
      var nowBtn = document.getElementById("sync-now");

      function setMsg(text, kind) {
        msgEl.textContent = text || "";
        msgEl.className = "sync-msg" + (kind ? " " + kind : "");
      }
      function refreshState() {
        var key = sync.getKey();
        stateEl.textContent = key ? "코드 연결됨" : "코드 없음";
        codeEl.value = key;
        nowBtn.disabled = !key;
      }

      document.getElementById("sync-toggle").addEventListener("click", function () {
        bodyEl.classList.toggle("hidden");
      });
      document.getElementById("sync-gen").addEventListener("click", function () {
        codeEl.value = sync.generateKey();
        setMsg("새 코드를 만들었습니다. '코드 저장'을 눌러 적용하세요.", "");
      });
      document.getElementById("sync-save").addEventListener("click", function () {
        var k = sync.setKey(codeEl.value);
        refreshState();
        setMsg(k ? "코드를 저장했습니다. 자동 동기화 중…" : "코드를 비웠습니다.", "ok");
        if (k) sync.auto(); // 코드를 넣자마자 바로 한 번 동기화
      });
      document.getElementById("sync-forget").addEventListener("click", function () {
        sync.setKey("");
        refreshState();
        setMsg("이 기기에서 코드를 지웠습니다(로컬 데이터는 그대로).", "ok");
      });
      nowBtn.addEventListener("click", function () {
        if (codeEl.value.trim() && codeEl.value.trim() !== sync.getKey()) sync.setKey(codeEl.value);
        refreshState();
        nowBtn.disabled = true;
        setMsg("동기화 중…", "");
        sync.syncNow().then(function (res) {
          render();
          refreshState();
          setMsg("완료 · 받음 " + res.pulled + " · 보냄 " + res.pushed + " · 삭제 " + res.deleted, "ok");
        }).catch(function (err) {
          refreshState();
          setMsg("실패: " + (err && err.message ? err.message : "알 수 없는 오류"), "err");
        });
      });

      // 자동 동기화: 변경 시(store.js 디바운스 push)와 로드 시(pull) 모두 끝나면 다시 그린다.
      sync.onSync(function (res) {
        render();
        refreshState();
        if (res) setMsg("자동 동기화됨 · 받음 " + res.pulled + " · 보냄 " + res.pushed +
          (res.deleted ? " · 삭제 " + res.deleted : ""), "ok");
      });

      refreshState();
      if (sync.getKey()) { setMsg("자동 동기화 중…", ""); sync.auto(); } // 페이지 열면 바로 받아오기
    })();

    render();
  })();
  </script>
</body>
</html>
